# DKMS config for the patched tuxedo-drivers (Uniwill keyboard + hardware rainbow).
# Rebuilds automatically on kernel upgrades. Installs only the modules needed to
# drive the single-zone RGB keyboard; the upstream tree builds the rest but they
# are left uninstalled.
PACKAGE_NAME="tuxedo-drivers-avell"
PACKAGE_VERSION="1.0.0"
AUTOINSTALL="yes"

# Upstream's Makefile uses $(shell uname -r); override KDIR so DKMS builds for
# the *target* kernel, not the running one.
MAKE[0]="make KDIR=/lib/modules/${kernelver}/build"
CLEAN="make clean"

BUILT_MODULE_NAME[0]="tuxedo_compatibility_check"
BUILT_MODULE_LOCATION[0]="src/tuxedo_compatibility_check"
DEST_MODULE_LOCATION[0]="/updates"

BUILT_MODULE_NAME[1]="tuxedo_keyboard"
BUILT_MODULE_LOCATION[1]="src"
DEST_MODULE_LOCATION[1]="/updates"

BUILT_MODULE_NAME[2]="uniwill_wmi"
BUILT_MODULE_LOCATION[2]="src"
DEST_MODULE_LOCATION[2]="/updates"
